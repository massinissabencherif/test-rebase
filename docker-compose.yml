services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: comicster
      POSTGRES_USER: comicster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comicster_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicster -d comicster"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend (Express + Prisma) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://comicster:${POSTGRES_PASSWORD:-comicster_secret}@postgres:5432/comicster
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MARVEL_PUBLIC_KEY: ${MARVEL_PUBLIC_KEY:-}
      MARVEL_PRIVATE_KEY: ${MARVEL_PRIVATE_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"

  # ─── Frontend (Nuxt 3) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3001}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
  uploads_data:
