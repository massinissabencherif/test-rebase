name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comicster
          POSTGRES_PASSWORD: comicster_secret
          POSTGRES_DB: comicster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://comicster:comicster_secret@localhost:5432/comicster_test
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 15m
      SESSION_SECRET: ci_session_secret
      PORT: 3001

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test --if-present

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3001

  # ─── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker — compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build
        env:
          POSTGRES_PASSWORD: comicster_secret
          JWT_SECRET: ci_test_secret
          JWT_EXPIRES_IN: 15m
          NUXT_PUBLIC_API_BASE: http://localhost:3001
