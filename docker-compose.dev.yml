# Compose pour le développement local
# Lance uniquement PostgreSQL — backend et frontend tournent avec npm run dev
#
# Usage : docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: comicster
      POSTGRES_USER: comicster
      POSTGRES_PASSWORD: comicster_secret
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicster -d comicster"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data_dev:
